<!doctype html>
<html lang="ja">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LINE予約</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #222222;
        --muted: #667085;
        --line: #d9dee7;
        --primary: #06c755;
        --primary-dark: #05a849;
        --danger: #c2410c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      h1 {
        margin: 8px 0 20px;
        font-size: 24px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      .panel {
        display: none;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 6px 20px rgba(23, 32, 49, 0.06);
      }

      .panel.active {
        display: block;
      }

      .field {
        margin-bottom: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 700;
      }

      select,
      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        font: inherit;
        background: #ffffff;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 13px 16px;
        background: var(--primary);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button:disabled {
        background: #a8b3c2;
        cursor: wait;
      }

      .secondary {
        margin-top: 10px;
        background: #eef2f6;
        color: var(--text);
      }

      .secondary:hover {
        background: #e1e7ef;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .slot {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .slot.selected {
        background: var(--primary);
        color: #ffffff;
        border-color: var(--primary);
      }

      .summary {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .summary div {
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
      }

      .summary span {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .message {
        margin: 14px 0 0;
        color: var(--danger);
        font-weight: 700;
        white-space: pre-wrap;
      }

      .note {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>予約</h1>

      <section id="stepForm" class="panel active">
        <h2>予約内容を入力</h2>
        <div class="field">
          <label for="menu">メニュー</label>
          <select id="menu"></select>
        </div>
        <div class="field">
          <label for="date">日付</label>
          <select id="date"></select>
        </div>
        <div class="field">
          <label>時間</label>
          <div id="slots" class="slot-grid"></div>
        </div>
        <div class="field">
          <label for="name">氏名</label>
          <input id="name" autocomplete="name" placeholder="山田 太郎">
        </div>
        <div class="field">
          <label for="phone">電話番号</label>
          <input id="phone" autocomplete="tel" inputmode="tel" placeholder="09012345678">
        </div>
        <div class="field">
          <label for="comment">コメント 任意</label>
          <textarea id="comment" placeholder="事前に伝えたいことがあれば入力してください"></textarea>
        </div>
        <button id="confirmButton" type="button">確認する</button>
        <p id="formMessage" class="message"></p>
      </section>

      <section id="stepConfirm" class="panel">
        <h2>予約内容の確認</h2>
        <div id="summary" class="summary"></div>
        <button id="submitButton" type="button">予約を確定する</button>
        <button id="backButton" class="secondary" type="button">戻る</button>
        <p id="confirmMessage" class="message"></p>
      </section>

      <section id="stepDone" class="panel">
        <h2>予約が完了しました</h2>
        <p id="doneText" class="note"></p>
      </section>
    </main>

    <script>
      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwSVv0drjtOyWAROgi5E41ic9YzOBXmc7MJKXqqqZ8cVTJu8cL63mAlIpiBvjIwFd6Z/exec';

      const state = {
        menus: [],
        dates: [],
        selectedSlot: '',
        submitting: false,
      };

      const elements = {
        form: document.getElementById('stepForm'),
        confirm: document.getElementById('stepConfirm'),
        done: document.getElementById('stepDone'),
        menu: document.getElementById('menu'),
        date: document.getElementById('date'),
        slots: document.getElementById('slots'),
        name: document.getElementById('name'),
        phone: document.getElementById('phone'),
        comment: document.getElementById('comment'),
        confirmButton: document.getElementById('confirmButton'),
        submitButton: document.getElementById('submitButton'),
        backButton: document.getElementById('backButton'),
        summary: document.getElementById('summary'),
        formMessage: document.getElementById('formMessage'),
        confirmMessage: document.getElementById('confirmMessage'),
        doneText: document.getElementById('doneText'),
      };

      document.addEventListener('DOMContentLoaded', initialize);
      elements.menu.addEventListener('change', loadAvailability);
      elements.date.addEventListener('change', loadAvailability);
      elements.confirmButton.addEventListener('click', showConfirm);
      elements.backButton.addEventListener('click', () => showPanel('form'));
      elements.submitButton.addEventListener('click', submitReservation);

      function initialize() {
        if (!isApiConfigured()) {
          showMessage(elements.formMessage, 'GAS_WEB_APP_URL にGASのWebアプリURLを設定してください。');
          setLoading(false);
          return;
        }

        setLoading(true);
        callApi('initialData')
          .then(data => {
            state.menus = data.menus || [];
            state.dates = data.dates || [];
            renderOptions(elements.menu, state.menus, 'menu_id', 'menu_name');
            renderOptions(elements.date, state.dates, 'value', 'label');
            loadAvailability();
          })
          .catch(error => {
            showMessage(elements.formMessage, error.message || String(error));
            setLoading(false);
          });
      }

      function renderOptions(select, items, valueKey, labelKey) {
        select.innerHTML = '';
        items.forEach(item => {
          const option = document.createElement('option');
          option.value = item[valueKey];
          option.textContent = item[labelKey];
          select.appendChild(option);
        });
      }

      function loadAvailability() {
        state.selectedSlot = '';
        elements.slots.innerHTML = '';
        showMessage(elements.formMessage, '');

        if (!elements.menu.value || !elements.date.value) {
          setLoading(false);
          return;
        }

        setLoading(true);
        callApi('availability', {
          date: elements.date.value,
          menu_id: elements.menu.value,
        })
          .then(data => {
            renderSlots(data.slots || []);
            setLoading(false);
          })
          .catch(error => {
            showMessage(elements.formMessage, error.message || String(error));
            setLoading(false);
          });
      }

      function renderSlots(slots) {
        elements.slots.innerHTML = '';

        if (slots.length === 0) {
          elements.slots.textContent = '空き時間がありません。';
          return;
        }

        slots.forEach(slot => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'slot';
          button.textContent = slot.label;
          button.addEventListener('click', () => {
            state.selectedSlot = slot.value;
            document.querySelectorAll('.slot').forEach(item => item.classList.remove('selected'));
            button.classList.add('selected');
          });
          elements.slots.appendChild(button);
        });
      }

      function showConfirm() {
        const payload = getPayload();
        const validationMessage = validatePayload(payload);

        if (validationMessage) {
          showMessage(elements.formMessage, validationMessage);
          return;
        }

        showMessage(elements.formMessage, '');
        elements.summary.innerHTML = [
          ['メニュー', getSelectedMenuName()],
          ['日時', `${payload.date} ${payload.time}`],
          ['氏名', payload.name],
          ['電話番号', payload.phone],
          ['コメント', payload.comment || 'なし'],
        ].map(([label, value]) => `<div><span>${escapeHtml(label)}</span>${escapeHtml(value)}</div>`).join('');

        showPanel('confirm');
      }

      function submitReservation() {
        if (state.submitting) return;

        const payload = getPayload();
        const validationMessage = validatePayload(payload);

        if (validationMessage) {
          showMessage(elements.confirmMessage, validationMessage);
          return;
        }

        state.submitting = true;
        elements.submitButton.disabled = true;
        showMessage(elements.confirmMessage, '');

        callApi('createReservation', payload)
          .then(result => {
            elements.doneText.textContent = `${result.name}様、${result.start_at} からの予約を受け付けました。`;
            showPanel('done');
          })
          .catch(error => {
            showMessage(elements.confirmMessage, error.message || String(error));
            state.submitting = false;
            elements.submitButton.disabled = false;
          });
      }

      function getPayload() {
        return {
          menu_id: elements.menu.value,
          date: elements.date.value,
          time: state.selectedSlot,
          name: elements.name.value.trim(),
          phone: elements.phone.value.trim(),
          comment: elements.comment.value.trim(),
        };
      }

      function validatePayload(payload) {
        if (!payload.menu_id) return 'メニューを選択してください。';
        if (!payload.date) return '日付を選択してください。';
        if (!payload.time) return '時間を選択してください。';
        if (!payload.name) return '氏名を入力してください。';
        if (!payload.phone) return '電話番号を入力してください。';
        return '';
      }

      function getSelectedMenuName() {
        const menu = state.menus.find(item => item.menu_id === elements.menu.value);
        return menu ? menu.menu_name : '';
      }

      function showPanel(name) {
        elements.form.classList.toggle('active', name === 'form');
        elements.confirm.classList.toggle('active', name === 'confirm');
        elements.done.classList.toggle('active', name === 'done');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showMessage(element, message) {
        element.textContent = message || '';
      }

      function setLoading(isLoading) {
        elements.confirmButton.disabled = isLoading;
      }

      function isApiConfigured() {
        return GAS_WEB_APP_URL && !GAS_WEB_APP_URL.includes('ここにGAS');
      }

      function callApi(action, params = {}) {
        return new Promise((resolve, reject) => {
          const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const url = new URL(GAS_WEB_APP_URL);
          url.searchParams.set('action', action);
          url.searchParams.set('callback', callbackName);

          Object.entries(params).forEach(([key, value]) => {
            url.searchParams.set(key, value == null ? '' : value);
          });

          const script = document.createElement('script');
          const timeoutId = window.setTimeout(() => {
            cleanup();
            reject(new Error('通信がタイムアウトしました。'));
          }, 20000);

          window[callbackName] = response => {
            cleanup();
            if (response && response.ok) {
              resolve(response.data);
            } else {
              reject(new Error((response && response.error) || '処理に失敗しました。'));
            }
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('GAS APIに接続できませんでした。'));
          };

          script.src = url.toString();
          document.body.appendChild(script);

          function cleanup() {
            window.clearTimeout(timeoutId);
            delete window[callbackName];
            script.remove();
          }
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  </body>
</html>
